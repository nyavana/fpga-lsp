name: CI

on:
  push:
  pull_request:

jobs:
  validate-and-smoke:
    # v1 is Linux x64 only by spec (capability ci-smoke-test, "v1 CI matrix is Linux x64 only").
    # Do NOT add a matrix for macOS/Windows/arm64 here; that is a v1.1 concern.
    runs-on: ubuntu-latest

    env:
      # Workspace-local plugin data dir so the install-verible.sh script and the
      # verible-ls wrapper agree on a writable location during CI.
      CLAUDE_PLUGIN_DATA: ${{ github.workspace }}/.claude-plugin-data

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install claude CLI
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Validate plugin manifest
        # Spec: CI runs `claude plugin validate` on the manifest before any
        # other smoke step; fail on manifest, hook, or .lsp.json schema errors.
        run: |
          set -euo pipefail
          claude plugin validate plugins/fpga-lsp

      - name: Install Verible (run install-verible.sh)
        run: |
          set -euo pipefail
          bash plugins/fpga-lsp/scripts/install-verible.sh
          test -x "${CLAUDE_PLUGIN_DATA}/bin/verible-verilog-ls"
          "${CLAUDE_PLUGIN_DATA}/bin/verible-verilog-ls" --version || true

      - name: Assert pinned Verible version matches installed binary
        # Spec: CI uses the pinned Verible version from a single shared source
        # (scripts/verible.version). Fail if the installed binary disagrees.
        run: |
          set -euo pipefail
          PINNED="$(cat plugins/fpga-lsp/scripts/verible.version)"
          if [ -z "$PINNED" ]; then
            echo "verible.version is empty" >&2
            exit 1
          fi
          BIN="${CLAUDE_PLUGIN_DATA}/bin/verible-verilog-ls"
          # `verible-verilog-ls --version` may print to stdout or stderr; combine.
          ACTUAL_RAW="$("$BIN" --version 2>&1 || true)"
          # Best-effort version extraction; if the binary stops printing a
          # parseable string in a future release, fall back to a soft check
          # that the binary at least lives in the install path we just populated.
          ACTUAL="$(printf '%s' "$ACTUAL_RAW" | grep -oE 'v[0-9]+\.[0-9]+-[0-9]+-g[0-9a-f]+' | head -1 || true)"
          if [ -n "$ACTUAL" ]; then
            if [ "$ACTUAL" != "$PINNED" ]; then
              echo "version mismatch: pinned=$PINNED actual=$ACTUAL" >&2
              exit 1
            fi
            echo "verible version OK: $ACTUAL"
          else
            echo "could not parse Verible version from output; soft-checking install path"
            test -x "$BIN"
          fi

      - name: Install plugin via local marketplace
        # Spec task 10.3: exercise the install flow against the local checkout.
        # The CLI may require an authenticated Claude Code session for
        # `plugin install`; in that case the headless install is skipped with
        # a clear note. The validate step above already exercised the manifest
        # and .lsp.json schema, so this is belt-and-suspenders coverage.
        run: |
          set -euo pipefail
          claude plugin marketplace --help >/tmp/mp-help.txt 2>&1 || true
          if ! grep -q "marketplace" /tmp/mp-help.txt; then
            echo "claude plugin marketplace subcommand not available in this CLI build; skipping"
            exit 0
          fi
          if ! claude plugin marketplace add ./ >/tmp/mp-add.log 2>&1; then
            echo "marketplace add failed (likely requires interactive Claude session); skipping"
            sed 's/^/  /' /tmp/mp-add.log
            # TODO(v1.1): exercise full install flow once headless install is supported
            exit 0
          fi
          if ! claude plugin install fpga-lsp@fpga-lsp >/tmp/mp-install.log 2>&1; then
            echo "plugin install failed (likely requires interactive Claude session); skipping"
            sed 's/^/  /' /tmp/mp-install.log
            # TODO(v1.1): exercise full install flow once headless install is supported
            exit 0
          fi
          echo "plugin install via local marketplace succeeded"

      - name: LSP smoke test (parse .lsp.json, exec wrapper, assert diagnostics)
        # Spec: parse .lsp.json for the verible server's `command`, substitute
        # ${CLAUDE_PLUGIN_ROOT}, exec exactly that, and assert at least one
        # diagnostic comes back for a deliberately broken sample. Do NOT
        # hard-code verible-verilog-ls here — the point is to catch a typo
        # in the manifest's command path.
        run: |
          set -euo pipefail

          # Standalone .lsp.json is keyed by server name directly (no
          # `lspServers` wrapper — that envelope is only used when LSPs
          # are inlined into plugin.json). See plugins-reference docs.
          LSP_CMD="$(jq -r '.verible.command' plugins/fpga-lsp/.lsp.json)"
          if [ -z "$LSP_CMD" ] || [ "$LSP_CMD" = "null" ]; then
            echo ".lsp.json missing verible.command" >&2
            exit 1
          fi
          # Substitute ${CLAUDE_PLUGIN_ROOT} literally; jq returned the raw
          # template string so we expand it ourselves with the checkout path.
          PLUGIN_ROOT="${GITHUB_WORKSPACE}/plugins/fpga-lsp"
          LSP_CMD="${LSP_CMD//\$\{CLAUDE_PLUGIN_ROOT\}/${PLUGIN_ROOT}}"

          if [ ! -x "$LSP_CMD" ]; then
            echo "resolved LSP command is not executable: $LSP_CMD" >&2
            exit 1
          fi

          export CLAUDE_PLUGIN_ROOT="${PLUGIN_ROOT}"
          export CLAUDE_PROJECT_DIR="${GITHUB_WORKSPACE}"

          cat > /tmp/broken.sv <<'SVEOF'
          module bad;
            logic x;
            assign x = ;
          SVEOF

          python3 - "$LSP_CMD" /tmp/broken.sv <<'PYEOF'
          import json, os, subprocess, sys, threading, time
          lsp, path = sys.argv[1], sys.argv[2]
          text = open(path, "r", encoding="utf-8").read()
          p = subprocess.Popen([lsp], stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
          errbuf = []
          threading.Thread(target=lambda: errbuf.extend(iter(p.stderr.readline, b"")), daemon=True).start()
          def send(m):
              b = json.dumps(m).encode()
              p.stdin.write(f"Content-Length: {len(b)}\r\n\r\n".encode() + b); p.stdin.flush()
          def recv(deadline):
              hdr = b""
              while b"\r\n\r\n" not in hdr:
                  if time.time() > deadline: return None
                  c = p.stdout.read(1)
                  if not c: return None
                  hdr += c
              n = 0
              for line in hdr.decode("ascii", "replace").split("\r\n"):
                  if line.lower().startswith("content-length:"):
                      n = int(line.split(":", 1)[1].strip()); break
              body = b""
              while len(body) < n:
                  if time.time() > deadline: return None
                  chunk = p.stdout.read(n - len(body))
                  if not chunk: return None
                  body += chunk
              return json.loads(body.decode("utf-8"))
          send({"jsonrpc":"2.0","id":1,"method":"initialize","params":{"processId":None,"rootUri":"file:///tmp","capabilities":{"textDocument":{"publishDiagnostics":{}}}}})
          if recv(time.time() + 10) is None:
              sys.stderr.write("no response to initialize\n" + b"".join(errbuf).decode("utf-8","replace")); p.kill(); sys.exit(1)
          send({"jsonrpc":"2.0","method":"initialized","params":{}})
          send({"jsonrpc":"2.0","method":"textDocument/didOpen","params":{"textDocument":{"uri":"file://"+os.path.abspath(path),"languageId":"systemverilog","version":1,"text":text}}})
          deadline = time.time() + 10
          while time.time() < deadline:
              m = recv(deadline)
              if m and m.get("method") == "textDocument/publishDiagnostics":
                  diags = m.get("params", {}).get("diagnostics", [])
                  if diags:
                      print(f"got {len(diags)} diagnostic(s) from broken sample"); p.terminate(); sys.exit(0)
          sys.stderr.write("timed out waiting for non-empty publishDiagnostics\n" + b"".join(errbuf).decode("utf-8","replace")); p.kill(); sys.exit(1)
          PYEOF
